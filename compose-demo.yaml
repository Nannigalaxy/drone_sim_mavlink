services:

  rtsp:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: demo_rtsp

    working_dir: /app/support

    command:
      - sh
      - -c
      - |
        ./video2rtsp.sh file /app/samples/waitwhat.mp4

    volumes:
      - ./samples:/app/samples


  telemetry:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: demo_telemetry

    working_dir: /app

    depends_on:
      - rtsp

    command:
      - ./build/telemetry_app
      - --analyze-full
      - --udp
      - "14550"
      - "0.0.0.0"

    volumes:
      - ./output:/app/output


  tlog2udp:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: demo_tlog2udp

    working_dir: /app

    depends_on:
      - telemetry

    command:
      - sh
      - -c
      - |
        sleep 3 && \
        python3 support/tlog2udp.py \
        /app/samples/test_flight_tail1.tlog \
        telemetry \
        14550

    volumes:
      - ./samples:/app/samples


  video_viewer:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: demo_video_viewer

    working_dir: /app

    depends_on:
      - rtsp

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - RTSP_URL=rtsp://rtsp:8554/live

    command:
      - sh
      - -c
      - |
        sleep 5 && ./build/video_app

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw